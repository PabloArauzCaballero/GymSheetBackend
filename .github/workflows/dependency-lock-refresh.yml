name: Dependency Lock Refresh

on:
  push:
    branches:
      - HARDENING
    paths:
      - package.json
      - .github/workflows/dependency-lock-refresh.yml

permissions:
  contents: write

concurrency:
  group: dependency-lock-refresh-${{ github.ref }}
  cancel-in-progress: true

jobs:
  refresh-lockfile:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout HARDENING
        uses: actions/checkout@v4
        with:
          ref: HARDENING
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Resolve declared dependency versions
        run: yarn install --non-interactive

      - name: Commit refreshed lockfile
        run: |
          if git diff --quiet -- yarn.lock; then
            echo "yarn.lock is already synchronized"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add yarn.lock
          git commit -m "chore(dependencies): refresh locked dependency graph"
          git push origin HEAD:HARDENING
