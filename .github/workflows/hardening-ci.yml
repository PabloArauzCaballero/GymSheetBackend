name: Hardening CI

on:
  push:
    branches:
      - HARDENING
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: hardening-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install locked dependencies
        run: yarn install --frozen-lockfile

      - name: Type check
        run: yarn type-check

      - name: Unit tests
        run: yarn test

      - name: Production build
        run: yarn build
